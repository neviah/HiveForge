<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiveForge Dashboard</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="header">
    <h1>HiveForge OS</h1>
    <p>Multi-agent operating dashboard</p>
  </header>

  <main class="grid">
    <section id="project-overview" class="panel">Project Overview Panel</section>
    <section id="agent-activity" class="panel">Agent Activity Monitor</section>
    <section id="kanban" class="panel">Kanban Board</section>
    <section id="settings" class="panel">Settings Panel</section>
    <section id="ceo-chat" class="panel">CEO Chat Interface</section>
    <section id="logs" class="panel">Logs and Timeline</section>
    <section id="vault" class="panel">Credential Vault</section>
    <section id="sandbox-controls" class="panel">Sandbox Controls</section>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
